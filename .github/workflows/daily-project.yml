name: Daily Biotech Project

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create daily project
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          LESSON_EMAIL_TO: ${{ secrets.LESSON_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/daily_project_builder.py

      - name: Polish portfolio README
        run: python scripts/polish_readme.py

      - name: Commit daily project
        run: |
          git config user.name "Meena Vignesh M"
          git config user.email "meenavignesh6789@gmail.com"
          git add README.md projects/ scripts/
          if git diff --cached --quiet; then
            echo "No project changes to commit."
          else
            git commit -m "Add daily biotech project"
            git push
          fi
