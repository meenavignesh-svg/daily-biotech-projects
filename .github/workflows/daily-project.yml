name: Computational Biotechnology Portfolio Build

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: computational-biotech-portfolio
  cancel-in-progress: true

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build portfolio project
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          LESSON_EMAIL_TO: ${{ secrets.LESSON_EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/daily_project_builder.py

      - name: Refresh portfolio README
        run: python scripts/polish_readme.py

      - name: Build GitHub Pages site
        run: python scripts/site_builder.py

      - name: Commit portfolio update
        run: |
          git config user.name "Meena Vignesh M"
          git config user.email "meenavignesh6789@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No portfolio changes to commit."
          else
            git commit -m "Add computational biotech portfolio project"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
